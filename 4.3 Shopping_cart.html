<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="4.3 Shopping_cart.css">
</head>
<body>
    <header>
        <h1>Shopping Cart</h1>
    </header>

    <main>
        <div class="form-container">
            <h2>Shipping Information</h2>
            <form id="checkout-form">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>

                <label for="address">Address:</label>
                <input type="text" id="address" placeholder="Enter your address" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <h2>Payment Information</h2>
                <label for="card-number">Credit Card Number:</label>
                <input type="text" id="card-number" placeholder="Enter your card number" required>

                <label for="expiration">Expiration Date:</label>
                <input type="text" id="expiration" placeholder="MM/YY" required>

                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" placeholder="Enter CVV" required>

                <h2>Order Summary</h2>
                <div class="order-summary">
                    <p>Items in your cart:</p>
                    <ul>
                        <li>Fresh Milk - 20 litres</li>
                        <li>Organic Eggs - 12 units</li>
                        <li>Free-Range Chicken - 1 unit</li>
                    </ul>
                    <p><strong>Total Cost: $35.00</strong></p>
                </div>

                <div class="buttons">
                    <button type="submit" id="confirm-order">Confirm Order</button>
                    <button type="button" id="back-to-cart">Back to Cart</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>Thank you for shopping with us!</p>
    </footer>

    <script src="4.3 Shopping_cart.js"></script>
</body>
</html>
