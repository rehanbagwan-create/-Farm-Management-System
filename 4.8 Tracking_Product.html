<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Order</title>
    <link rel="stylesheet" href="4.8 Tracking_Product.css">
</head>
<body>
    <header>
        <h1>Tracking Order</h1>
    </header>

    <main>
        <div class="tracking-container">
            <h2>Order Tracking Details</h2>
            <div class="tracking-info">
                <h3>Order #123456</h3>
                <ul>
                    <li>
                        <span class="status">Order Placed</span>
                        <span class="date">- October 1, 2024</span>
                    </li>
                    <li>
                        <span class="status">Dispatched</span>
                        <span class="date">- October 2, 2024</span>
                    </li>
                    <li>
                        <span class="status">In Transit</span>
                        <span class="date">- October 3, 2024</span>
                    </li>
                    <li>
                        <span class="status">Out for Delivery</span>
                        <span class="date">- October 4, 2024</span>
                    </li>
                    <li>
                        <span class="status">Delivered</span>
                        <span class="date">- October 5, 2024</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="back-button">
            <button id="back-to-dashboard">Back</button>
        </div>
    </main>

    <footer>
        <p>Thank you for choosing us!</p>
    </footer>

    <script src="4.8 Tracking_Product.js"></script>
</body>
</html>
