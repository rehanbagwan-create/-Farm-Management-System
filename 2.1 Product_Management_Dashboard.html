<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Dashboard</title>
    <link rel="stylesheet" href="2.1 Product_Management_Dashboard.css">
</head>
<body>
    <!-- Sticky Header -->
    <header>
        <h1>Product Management Dashboard</h1>
        <div class="account">
            <a href="2.2 Account_Details.html">
                <img src="account.png" alt="Account" class="account-icon">
            </a>
        </div>
        <p>Contact Us: <a href="mailto:support@dairyfarmers.com">support@dairyfarmers.com</a></p>
    </header>

    <!-- Main Content -->
    <main>
        <section class="overview">
            <h2>Product Logs Overview</h2>
            <div class="logs-summary">
                <p>Daily Logs: 10 entries</p>
                <p>Weekly Logs: 50 entries</p>
                <p>Monthly Logs: 200 entries</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="add-log">Add New Log</button>
                <button id="view-history">View History</button>
            </div>
        </section>
    </main>


    <script src="2.1 Product_Management_Dashboard.js"></script>
</body>
</html>
