<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="4.5 Account_settings.css">
</head>
<body>
    <header>
        <h1>Account Setting</h1>
    </header>

    <main>
        <div class="form-container">
            <h2>Profile Information</h2>
            <form id="account-settings-form">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>

                <h2>Change Password</h2>
                <label for="current-password">Current Password:</label>
                <input type="password" id="current-password" placeholder="Enter your current password" required>

                <label for="new-password">New Password:</label>
                <input type="password" id="new-password" placeholder="Enter your new password" required>

                <label for="confirm-password">Confirm New Password:</label>
                <input type="password" id="confirm-password" placeholder="Confirm your new password" required>

                <h2>Payment Methods</h2>
                <label for="payment-method">Add or Update Payment Method:</label>
                <input type="text" id="payment-method" placeholder="Enter payment method details">

                <h2>Shipping Addresses</h2>
                <label for="shipping-address">Add or Edit Shipping Address:</label>
                <input type="text" id="shipping-address" placeholder="Enter shipping address">

                <div class="buttons">
                    <button type="submit" id="save-changes">Save Changes</button>
                    <button type="button" id="back-dashboard">Back to Dashboard</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>Thank you for keeping your information up to date!</p>
    </footer>

    <script src="4.5 Account_settings.js"></script>
</body>
</html>
