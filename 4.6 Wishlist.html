<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link rel="stylesheet" href="4.6 Wishlist.css">
</head>
<body>
    <header>
        <h1>Wishlist</h1>
    </header>

    <main>
        <div class="wishlist-container">
            <h2>Your Saved Items</h2>
            <div class="product-list">
                <div class="product-item">
                    <img src="fresh_milk.jpg" alt="Fresh Milk">
                    <h3>Fresh Milk</h3>
                    <p>Price: $3.50</p>
                    <div class="buttons">
                        <button class="add-to-cart">Add to Cart</button>
                        <button class="remove">Remove from Wishlist</button>
                    </div>
                </div>
                <div class="product-item">
                    <img src="organic_eggs.jpg" alt="Organic Eggs">
                    <h3>Organic Eggs</h3>
                    <p>Price: $5.00</p>
                    <div class="buttons">
                        <button class="add-to-cart">Add to Cart</button>
                        <button class="remove">Remove from Wishlist</button>
                    </div>
                </div>
                <div class="product-item">
                    <img src="meat.jpg" alt="Free-Range Chicken">
                    <h3>Free-Range Chicken</h3>
                    <p>Price: $10.00</p>
                    <div class="buttons">
                        <button class="add-to-cart">Add to Cart</button>
                        <button class="remove">Remove from Wishlist</button>
                    </div>
                </div>
                <div class="product-item">
                    <img src="homemade_butter.jpg" alt="Homemade Butter">
                    <h3>Homemade Butter</h3>
                    <p>Price: $7.00</p>
                    <div class="buttons">
                        <button class="add-to-cart">Add to Cart</button>
                        <button class="remove">Remove from Wishlist</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="back-button">
            <button id="back-to-marketplace">Back to Marketplace</button>
        </div>
    </main>

    <footer>
        <p>Thank you for considering our products!</p>
    </footer>

    <script src="4.6 Wishlist.js"></script>
</body>
</html>
