<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Added</title>
    <link rel="stylesheet" href="2.4 Confirmation.css">
</head>
<body>
    <header>
        <h1>Log Added</h1>
    </header>

    <main>
        <div class="content">
            <p id="log-message">Your log has been successfully added!</p>
            <p><strong>Details of the Log:</strong></p>
            <ul id="log-details">
                <li><strong>Date:</strong> <span id="log-date"></span></li>
                <li><strong>Quantity:</strong> <span id="log-quantity"></span></li>
                <li><strong>Quality Grade:</strong> <span id="log-quality"></span></li>
                <li><strong>Animal/Bird ID:</strong> <span id="log-animal-id"></span></li>
            </ul>
        </div>
    </main>

    <footer>
        <button id="save-another">Save And Add Another</button>
        <button id="submit-logs">Submit Logs</button>
    </footer>

    <script src="2.4 Confirmation.js"></script>
</body>
</html>
