<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Listing</title>
    <link rel="stylesheet" href="3.4 View_listing.css">
</head>
<body>
    <header>
        <h1>View Listing</h1>
    </header>

    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Description</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Milk</td>
                        <td>Fresh milk from organic dairy farm, 1 liter packs.</td>
                        <td>$3.50</td>
                    </tr>
                    <tr>
                        <td>Eggs</td>
                        <td>Organic free-range eggs, pack of 12.</td>
                        <td>$5.00</td>
                    </tr>
                    <tr>
                        <td>Chicken</td>
                        <td>Farm-raised chicken, whole or cut.</td>
                        <td>$10.00 per kg</td>
                    </tr>
                    <tr>
                        <td>Butter</td>
                        <td>Homemade butter, 500g pack.</td>
                        <td>$7.00</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="buttons">
            <button id="edit-listing">Edit Listing</button>
            <button id="publish-listing">Publish Listing</button>
            <button id="back">Back</button>
        </div>
    </main>

    <script src="3.4 View_listing.js"></script>
</body>
</html>
