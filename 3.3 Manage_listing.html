<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listing</title>
    <link rel="stylesheet" href="3.3 Manage_listing.css">
</head>
<body>
    <header>
        <h1>Manage Store</h1>
    </header>

    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Product Listing</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Milk</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>Eggs</td>
                        <td>Out of Stock</td>
                    </tr>
                    <tr>
                        <td>Chicken</td>
                        <td>Draft</td>
                    </tr>
                    <tr>
                        <td>Butter</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>Cheese</td>
                        <td>Out of Stock</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="buttons">
            <button id="view-list-desc-price">View Listing</button>
            <button id="edit-listing">Edit Listing</button>
            <button id="deactivate-listing">Deactivate Listing</button>
            <button id="delete-listing">Delete Listing</button>
            <button id="back-dashboard">Back to Dashboard</button>
        </div>
    </main>

    <script src="3.3 Manage_listing.js"></script>
</body>
</html>
